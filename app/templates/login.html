{% extends "base.html" %}
{% block title %}Iniciar sesión{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="text-4xl mb-3 text-violet-400">&#9654;</div>
      <h1 class="text-2xl font-bold text-white">Movies &amp; Series</h1>
      <p class="text-gray-500 text-sm mt-1">Acceso privado</p>
    </div>

    {% if error %}
    <div class="bg-red-900/40 border border-red-700 text-red-300 rounded-lg px-4 py-3 mb-4 text-sm">
      {{ error }}
    </div>
    {% endif %}

    <form method="post" action="/login" class="bg-gray-900 border border-gray-800 rounded-xl p-6 space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1.5" for="email">Email</label>
        <input
          type="email" id="email" name="email" required autofocus
          class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 text-white
                 placeholder-gray-600 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500
                 transition-colors text-sm"
          placeholder="tu@email.com"
        >
      </div>

      <div>
        <label class="block text-sm text-gray-400 mb-1.5" for="password">Contraseña</label>
        <div class="relative">
          <input
            type="password" id="password" name="password" required
            class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2.5 pr-10 text-white
                   placeholder-gray-600 focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500
                   transition-colors text-sm"
            placeholder="••••••••"
          >
          <button type="button" onclick="togglePassword()"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition-colors"
            tabindex="-1" aria-label="Mostrar contraseña">
            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="eye-off-icon" xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
      </div>

      <button
        type="submit"
        class="w-full bg-violet-600 hover:bg-violet-700 text-white font-medium py-2.5 rounded-lg
               transition-colors text-sm mt-2"
      >
        Entrar
      </button>
    </form>

  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password');
  const eyeOn  = document.getElementById('eye-icon');
  const eyeOff = document.getElementById('eye-off-icon');
  const visible = input.type === 'text';
  input.type = visible ? 'password' : 'text';
  eyeOn.classList.toggle('hidden', !visible);
  eyeOff.classList.toggle('hidden', visible);
}
</script>
{% endblock %}
